<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Vitalis Pharmacy</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .forgot-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            font-family: Arial, sans-serif;
        }
        .forgot-container h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .forgot-container p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .forgot-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .forgot-form button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .forgot-form button:hover {
            background: #2980b9;
        }
        .reset-section {
            display: none;
            margin-top: 20px;
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #e74c3c;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h3>Welcome to Vitalis</h3>
        <p>Reset your password securely</p>
        <form class="forgot-form" id="forgotForm">
            <input type="email" id="resetEmail" placeholder="Email Address" required>
            <button type="button" id="sendResetBtn">Send Reset Link</button>
            
            <div class="reset-section" id="resetSection">
                <input type="text" id="resetOtp" placeholder="Enter Reset Code" maxlength="6">
                <input type="password" id="newPassword" placeholder="New Password">
                <input type="password" id="confirmNewPassword" placeholder="Confirm New Password">
                <button type="submit">Reset Password</button>
            </div>
        </form>
        <a href="index.html" class="back-link">Back to Home</a>
    </div>

    <script>
        const sendResetBtn = document.getElementById('sendResetBtn');
        const resetSection = document.getElementById('resetSection');
        const forgotForm = document.getElementById('forgotForm');

        sendResetBtn.addEventListener('click', function() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                alert('Please enter your email address.');
                return;
            }
            
            // Simulate sending reset code
            alert('Reset code sent to your email. Please check and enter below.');
            resetSection.style.display = 'block';
            sendResetBtn.style.display = 'none';
        });

        forgotForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const otp = document.getElementById('resetOtp').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (!otp || !newPassword || !confirmPassword) {
                alert('Please fill all fields.');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Simulate password reset
            alert('Password reset successful! Please login with your new password.');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
